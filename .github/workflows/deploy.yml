name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build jar
        run: ./gradlew bootJar

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci-deploy

      - name: Wait for Tailscale connectivity
        run: |
          for i in $(seq 1 10); do
            tailscale ping --timeout=2s "$HOST" && break
            sleep 2
          done
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_deploy build/libs/*.jar root@"$HOST":/opt/mrgreen/app.jar
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_deploy root@"$HOST" "chown mrgreen:mrgreen /opt/mrgreen/app.jar && systemctl restart mrgreen"
