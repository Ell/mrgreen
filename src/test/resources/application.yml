spring:
  main:
    web-application-type: none
  datasource:
    url: jdbc:sqlite::memory:
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate

discord:
  token: test-token
  client-id: "0"
  prefix: "%"
  bridge-bot-ids: ""

google:
  api-key: test-key

management:
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318
