spring:
  main:
    web-application-type: none
  application:
    name: "mrgreen"
  datasource:
    url: jdbc:sqlite:${DB_PATH:mrgreen.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

discord:
  token: ${DISCORD_TOKEN}
  client-id: ${DISCORD_CLIENT_ID}
  prefix: "%"
  bridge-bot-ids: ${DISCORD_BRIDGE_BOT_IDS:}

judge0:
  api-key: ${JUDGE0_API_KEY:}
  api-host: ${JUDGE0_API_HOST:judge0-ce.p.rapidapi.com}


management:
  otlp:
    metrics:
      export:
        url: ${GRAFANA_OTLP_ENDPOINT:}
        headers:
          Authorization: ${GRAFANA_OTLP_AUTH_HEADER:}
        step: 60s
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${GRAFANA_OTLP_TRACE_ENDPOINT:}
          headers:
            Authorization: ${GRAFANA_OTLP_AUTH_HEADER:}
